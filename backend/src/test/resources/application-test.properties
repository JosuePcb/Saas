# ===========================================
# SaaS - Test Configuration (Testcontainers)
# ===========================================

spring.application.name=saas-test

# --- JPA ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
spring.flyway.placeholders.app.superadmin.bcrypt_hash=$2a$12$7Ad.ZuFX8kQZrExwtrJYt.AuTqSuw0zUfASGoYxvBDUKyLhcFyi0G
spring.jpa.properties.hibernate.hbm2ddl.auto=none
spring.jpa.properties.hibernate.schema_validation.enabled=true

# --- JWT (test secret) ---
app.jwt.secret=dGVzdC1qd3Qtc2VjcmV0LWtleS1mb3ItdW5pdC10ZXN0cy1vbmx5LXZlcnktbG9uZy1hbmQtc2VjdXJl
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# --- Spring AI (disabled for tests) ---
spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=test-key
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.google.genai.GoogleGenAiAutoConfiguration,org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# --- Object Storage (test defaults) ---
app.storage.endpoint=http://localhost:9000
app.storage.access-key=test-access
app.storage.secret-key=test-secret
app.storage.pod-bucket=pod-evidence-test
app.storage.secure=false

# --- Logging ---
logging.level.com.saas=DEBUG
logging.level.org.springframework.security=WARN
