# ===========================================
# SaaS Micro-Logistics - Application Config
# ===========================================

spring.application.name=saas

# --- Database ---
spring.datasource.url=jdbc:postgresql://localhost:5433/saas_db
spring.datasource.username=saas_user
spring.datasource.password=saas_secret
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.placeholders.app.superadmin.bcrypt_hash=${SPRING_APP_SUPERADMIN_BCRYPT_HASH:}

# --- JWT ---
app.jwt.secret=c2Fhcy1taWNyby1sb2dpc3RpY3Mtand0LXNlY3JldC1rZXktdmVyeS1sb25nLWFuZC1zZWN1cmUtMjAyNg==
app.jwt.access-token-expiration-ms=900000
app.jwt.refresh-token-expiration-ms=604800000

# --- Spring Security ---
spring.security.user.name=disabled
spring.security.user.password=disabled

# --- SpringDoc OpenAPI ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logging ---
logging.level.com.saas=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# --- Spring AI (Gemini) ---
spring.ai.model.chat=google-genai
spring.ai.google.genai.api-key=${GEMINI_API_KEY:not-configured}
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# --- Object Storage (MinIO/S3 compatible) ---
app.storage.endpoint=${APP_STORAGE_ENDPOINT:http://localhost:9000}
app.storage.access-key=${APP_STORAGE_ACCESS_KEY:minioadmin}
app.storage.secret-key=${APP_STORAGE_SECRET_KEY:minioadmin}
app.storage.pod-bucket=${APP_STORAGE_POD_BUCKET:pod-evidence}
app.storage.secure=${APP_STORAGE_SECURE:false}
